name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation
        run: |
          pip install -e "services/ingestion[dev]"
          pip install -e "services/ml[dev]"
          pip install -e "services/api[dev]"

      - name: Ruff (linting)
        run: ruff check services/

      - name: Mypy (type checking)
        run: mypy services/ingestion/src services/api/src

  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation
        run: |
          pip install -e "services/ingestion[dev]"
          pip install -e "services/ml[dev]"
          pip install -e "services/api[dev]"

      - name: Pytest
        run: |
          pytest services/ingestion
          pytest services/ml
          pytest services/api

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
