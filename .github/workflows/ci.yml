name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          pip install -e shared
          pip install -e services/ingestion
          pip install -e services/healthscore
          pip install -e services/coach
          pip install -e services/dashboard
          pip install ruff mypy pytest pytest-asyncio pytest-cov pytest-httpx

      - name: Lint avec Ruff
        run: ruff check services/

      - name: Type check Mypy (ingestion)
        run: mypy services/ingestion/src

      - name: Type check Mypy (healthscore)
        run: mypy services/healthscore/src

      - name: Type check Mypy (coach)
        run: mypy services/coach/src

      - name: Type check Mypy (dashboard)
        run: mypy --config-file services/dashboard/pyproject.toml services/dashboard/src

      - name: Tests Ingestion
        run: pytest services/ingestion

      - name: Tests Healthscore
        run: pytest services/healthscore

      - name: Tests Coach
        run: pytest services/coach

      - name: Tests Dashboard
        run: pytest services/dashboard
