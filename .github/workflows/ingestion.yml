name: Ingestion planifiée

# Exécute le pipeline d'ingestion toutes les 30 minutes.
# Utilise les secrets GitHub pour les clés API.
# Coût : 0 € (dans les 2000 minutes/mois gratuites).

on:
  schedule:
    # Toutes les 30 minutes. GitHub free tier ne tient pas un cron à 15 min de
    # manière fiable (high-load delays), 30 min donne un rythme plus régulier.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source à ingérer (prim, aqicn, meteo, all)"
        required: false
        default: "all"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          pip install -e shared
          pip install -e services/ingestion

      - name: Ingestion PRIM IDFM
        if: ${{ inputs.source == 'prim' || inputs.source == 'all' || github.event_name == 'schedule' }}
        run: python -m ingestion.cli run --source prim --store
        env:
          PRIM_API_KEY: ${{ secrets.PRIM_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Ingestion AQICN
        if: ${{ inputs.source == 'aqicn' || inputs.source == 'all' || github.event_name == 'schedule' }}
        run: python -m ingestion.cli run --source aqicn --store
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Ingestion Open-Meteo
        if: false  # TODO: activer quand le client Open-Meteo sera implémenté
        run: python -m ingestion.cli run --source meteo --store
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Notifier en cas d'échec
        if: failure()
        run: echo "::warning::Ingestion échouée, voir les logs"
